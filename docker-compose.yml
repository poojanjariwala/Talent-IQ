version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: talent
      POSTGRES_PASSWORD: talent123
      POSTGRES_DB: talentdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  api:
    build: .
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://talent:talent123@db:5432/talentdb
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SECRET_KEY=your-secret-key-for-jwt-signing
      - PYTHONPATH=/app
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  worker:
    build: .
    command: celery -A app.tasks.parse_tasks.celery_app worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://talent:talent123@db:5432/talentdb
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - PYTHONPATH=/app
    depends_on:
      - db
      - redis

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    restart: always
    environment:
      - API_BASE_URL=http://api:8000
      - PYTHONPATH=/app
    volumes:
      - .:/app
    depends_on:
      - api
    ports:
      - "8501:8501"

volumes:
  postgres_data:
